services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: auth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.2
    container_name: redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  console:
    image: docker.redpanda.com/redpandadata/console:latest
    ports:
      - "8081:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      - redpanda
  topic-init:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.2
    depends_on:
      - redpanda
    entrypoint: |
      /bin/sh -c '
      set -e

      echo "waiting for cluster..."
      until rpk cluster info --brokers redpanda:9092 >/dev/null 2>&1; do
        sleep 2
      done

      echo "creating topics..."
      rpk topic create orders --brokers redpanda:9092 --partitions 3
      rpk topic create payments --brokers redpanda:9092 --partitions 3
      rpk topic create notifications --brokers redpanda:9092 --partitions 1

      echo "verifying..."
      rpk topic list --brokers redpanda:9092
      '

  auth-service:
    build: .
    working_dir: /app/app/auth
    command: sh -c "alembic upgrade head && uvicorn main:application --host 0.0.0.0 --port 8001"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8001
      DATABASE_URL: postgresql://postgres:secret@postgres:5432/auth_db
      JWT_SECRET_KEY: change-me-in-production
      JWT_ALGORITHM: HS256
      REDPANDA_BROKERS: redpanda:9092
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

    # ── etcd ──────────────────────────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: etcd
    restart: unless-stopped
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"         # Dev only — enable auth in prod
      ETCD_ADVERTISE_CLIENT_URLS: "http://0.0.0.0:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/bitnami/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── APISIX - GATEWAY ────────────────────────────────────────────────────────────── 
  apisix:
    image: apache/apisix:3.9.0-debian
    container_name: apisix
    restart: unless-stopped
    depends_on:
      etcd:
        condition: service_healthy
    ports:
      - "9080:9080"     # ← Gateway traffic port (clients call this)
      - "9180:9180"     # ← Admin API (bootstrap script + dashboard use this)
      - "9091:9091"     # ← Prometheus metrics
      - "9090:9090"     # ← Control API
    volumes:
      # Mount our config.yaml into the container
      - ./apisix_config/conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro

  # ── APISIX DASHBOARD ──────────────────────────────────────────────────────────────
  apisix-dashboard:
    image: apache/apisix-dashboard:3.0.0-centos
    container_name: apisix-dashboard
    restart: unless-stopped
    depends_on:
      - etcd
    ports:
      - "9000:9000"
    volumes:
      - ./apisix_config/dashboard_conf/conf.yaml:/usr/local/apisix-dashboard/conf/conf.yaml:ro
 
  # ── APISIX bootstrap ──────────────────────────────────────────────────────────────
  apisix-bootstrap:
    image: curlimages/curl:8.7.1
    container_name: apisix-bootstrap
    volumes:
      - ./apisix_config/bootstrap_routes.sh:/bootstrap_routes.sh:ro
    entrypoint: ["sh", "/bootstrap_routes.sh"]
    restart: "no"    # Run once and exit — do NOT restart after success
volumes:
  etcd_data:
  redpanda-data:
  postgres_data:

