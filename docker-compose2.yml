services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: etcd
    restart: unless-stopped
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"         # Dev only — enable auth in prod
      ETCD_ADVERTISE_CLIENT_URLS: "http://0.0.0.0:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/bitnami/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  apisix:
      image: apache/apisix:3.9.0-debian
      container_name: apisix
      restart: unless-stopped
      depends_on:
        etcd:
          condition: service_healthy
      ports:
        - "9080:9080"     # ← Gateway traffic port (clients call this)
        - "9180:9180"     # ← Admin API (bootstrap script + dashboard use this)
        - "9091:9091"     # ← Prometheus metrics
        - "9090:9090"     # ← Control API
      volumes:
        # Mount our config.yaml into the container
        - ./apisix_config/conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      healthcheck:
        # test: ["CMD", "curl", "-f", "http://localhost:9180/apisix/admin/services"]
        # test: ["CMD-SHELL", "wget -qO- --header='X-API-KEY: edd1c9f034335f136f87ad84b625c8f1' http://localhost:9180/apisix/admin/routes > /dev/null 2>&1 || exit 1"]
        interval: 10s
        timeout: 5s
        retries: 10
        start_period: 20s
    
volumes:
  etcd_data:
#   redpanda-data:
#   postgres_data:
